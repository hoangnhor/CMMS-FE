name: Keep Alive

on:
  schedule:
    - cron: "*/13 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        env:
          RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          url="${RENDER_HEALTH_URL:-https://cmms-be.onrender.com/api/health}"
          curl -fsS "$url" >/dev/null
